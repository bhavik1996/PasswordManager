  <body>
    <div class="form">
      <h2>Password Manager</h2>
      <form class="passwordform" action="" id="passwordForm">
        <input class="portalName passmanager" id="portalName" type="text" placeholder="Portal Name" />
        <input class="portalLink passmanager" id="portalLink" type="url" placeholder="Portal Link" />
        <input class="username passmanager" id="userName" type="text" placeholder="username" />
        <input class="password-input passmanager" id="passwordInput" type="password" placeholder="Password" />
        <!--value="password"-->
        <input class="date passmanager" id="inputDate" type="date" placeholder="Date" />
        <input class="notes passmanager" id="notes" type="text" placeholder="notes" />
        <div><button type="submit" class="btn" id="submitBtn">Submit</button></div>
      </form>
    </div>

            <th class="theading">Username</th>
            <th class="theading">Password</th>
            <th class="theading">Date (Asof)</th>
            <th class="theading">Notes</th>
